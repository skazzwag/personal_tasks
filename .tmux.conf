#-----------
# Essentials
#-----------

# Run shells as interactive so they source .bashrc
set -g default-command "${SHELL}"

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1 and not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Don't wait for escape sequences
set -sg escape-time 0

# Enable mouse support
set -g mouse on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Disable automatic window renaming (use prefix + ,)
set -g allow-rename off

# Ensure that .bash_profile is sourced when tmux starts
set-option -g default-command "exec bash -l"

#---------
# Keybinds
#---------

# Set emacs mode for keybinds
set -g mode-keys emacs
set -g status-keys emacs

# Change prefix to Ctrl+\
unbind C-b
set -g prefix C-\\
bind C-\\ send-prefix

# Change ways to make new panes
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Navigate panes with M-hjkl
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes with prefix-hjkl
bind -r h resize-pane -L
bind -r j resize-pane -D
bind -r k resize-pane -U
bind -r l resize-pane -R

# Quick window creation & navigation without prefix
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# Go directly to window numbers with Alt+number
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t 10

# Swap windows easily
bind -n M-S-Left swap-window -t -1\; select-window -t -1
bind -n M-S-Right swap-window -t +1\; select-window -t +1

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

#--------
# Visuals
#--------

# Clean, minimal status bar using terminal colors
set -g status-style bg=default,fg=default

# Simplify the status bar content
set -g status-left ''
set -g status-right '#[fg=default]#S '  # Just show the session name

# Window status styling
set -g window-status-current-style fg=default,bold
set -g window-status-style fg=default,dim
